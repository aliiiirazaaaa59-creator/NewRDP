name: Secure RDP

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secure-rdp:
    runs-on:
      - self-hosted
      - Windows
      - X64

    timeout-minutes: 30

    steps:
      - name: Validate Requirements
        shell: powershell
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"

          if ([string]::IsNullOrWhiteSpace($env:RDP_PASSWORD)) {
              throw "RDP_PASSWORD secret is missing or empty."
          }

          $tailscalePath = "$env:ProgramFiles\Tailscale\tailscale.exe"

          if (-not (Test-Path $tailscalePath)) {
              throw "Tailscale is not installed. Install and connect Tailscale on the self-hosted Windows machine first."
          }

          Write-Host "Required configuration found."

      - name: Configure Secure RDP Settings
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0 -Type DWord -Force

          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 1 -Type DWord -Force

          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "SecurityLayer" -Value 2 -Type DWord -Force

          Get-NetFirewallRule -DisplayName "RDP-Tailscale" -ErrorAction SilentlyContinue | Remove-NetFirewallRule

          New-NetFirewallRule -DisplayName "RDP-Tailscale" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389 -RemoteAddress "100.64.0.0/10" -Profile Any

          Set-Service -Name "TermService" -StartupType Automatic

          $rdpService = Get-Service -Name "TermService"

          if ($rdpService.Status -eq "Running") {
              Restart-Service -Name "TermService" -Force
          }
          else {
              Start-Service -Name "TermService"
          }

          Write-Host "Secure RDP configuration completed."

      - name: Create or Update RDP User
        shell: powershell
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"

          $username = "RDP"
          $securePassword = ConvertTo-SecureString $env:RDP_PASSWORD -AsPlainText -Force
          $existingUser = Get-LocalUser -Name $username -ErrorAction SilentlyContinue

          if ($existingUser) {
              Set-LocalUser -Name $username -Password $securePassword
              Enable-LocalUser -Name $username
              Write-Host "Existing RDP user updated."
          }
          else {
              New-LocalUser -Name $username -Password $securePassword -AccountNeverExpires -PasswordNeverExpires -Description "Tailscale Remote Desktop User"
              Write-Host "New RDP user created."
          }

          $rdpGroupMember = Get-LocalGroupMember -Group "Remote Desktop Users" -ErrorAction Stop | Where-Object {
              $_.Name -match "\\RDP$"
          }

          if (-not $rdpGroupMember) {
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          }

          Write-Host "RDP user permissions configured."

      - name: Verify Tailscale Connection
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $tailscalePath = "$env:ProgramFiles\Tailscale\tailscale.exe"

          & $tailscalePath status

          if ($LASTEXITCODE -ne 0) {
              throw "Tailscale is installed but not connected."
          }

          $tailscaleIP = (& $tailscalePath ip -4 | Select-Object -First 1).Trim()

          if ([string]::IsNullOrWhiteSpace($tailscaleIP)) {
              throw "Tailscale IPv4 address was not found."
          }

          "TAILSCALE_IP=$tailscaleIP" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Tailscale IP detected successfully."

      - name: Verify RDP Service
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $rdpService = Get-Service -Name "TermService"

          if ($rdpService.Status -ne "Running") {
              throw "Remote Desktop service is not running."
          }

          $rdpListener = Get-NetTCPConnection -LocalPort 3389 -State Listen -ErrorAction SilentlyContinue

          if (-not $rdpListener) {
              throw "Remote Desktop is not listening on TCP port 3389."
          }

          Write-Host ""
          Write-Host "================================"
          Write-Host "RDP CONFIGURATION SUCCESSFUL"
          Write-Host "================================"
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: Use the RDP_PASSWORD secret"
          Write-Host "================================"
